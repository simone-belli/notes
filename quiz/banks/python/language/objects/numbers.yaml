note: python/language/objects/numbers.md
tier: detail
questions:
  - id: why-eq-fails
    type: mcq
    q: Why is `0.1 + 0.2 == 0.3` False?
    options:
      - Floats are IEEE 754 binary — most decimal fractions can't be represented exactly
      - Python compares floats by identity, not value
      - Rounding mode defaults to truncation
      - The literals are parsed as different precisions
    explain: "Compare with tolerance instead: `math.isclose`, `pytest.approx`, or `np.isclose` depending on context."
  - id: abs-tol-near-zero
    type: mcq
    q: Why does `math.isclose(0.0, 1e-10)` return False with default arguments?
    options:
      - "`rel_tol * max(|a|, |b|)` collapses to ~0 near zero — you must pass `abs_tol`"
      - "1e-10 is above the default tolerance of 1e-12"
      - "`isclose` requires both arguments non-zero"
      - Denormalised floats compare unequal by definition
    explain: Relative tolerance scales with magnitude; near zero there is no magnitude. Always supply `abs_tol` when either value can be tiny.
  - id: pytest-approx
    type: mcq
    q: What is the idiomatic float assertion in pytest?
    options:
      - "`assert 0.1 + 0.2 == pytest.approx(0.3)` — also works element-wise on sequences and dicts"
      - "`assert math.isclose(0.1 + 0.2, 0.3)` — approx is deprecated"
      - "`assert round(0.1 + 0.2, 6) == 0.3`"
      - "`pytest.assert_almost_equal(0.1 + 0.2, 0.3)`"
    explain: "Defaults rel=1e-6, abs=1e-12; override with `pytest.approx(x, rel=1e-3)`. For arrays use `np.allclose`."
  - id: tool-per-context
    type: recall
    q: "Name the float-comparison tool for: general code, tests, NumPy arrays."
    answer: "`math.isclose(a, b, rel_tol=…, abs_tol=…)`; `pytest.approx`; `np.isclose` (element-wise bool array) / `np.allclose` (single bool). For a simple fixed scale, `abs(a-b) < tol` is fine."
